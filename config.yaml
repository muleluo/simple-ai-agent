# 简易 AI 桌面助手 - 配置文件
# 这个文件用于存储 API 配置（可以避免把密钥写死在代码里）

# API 配置
api:
  # API 密钥（从 OpenAI 官网获取）
  # ⚠️ 请替换成你自己的 API Key
  api_key: "sk-vftbZadWT0gVBAlGMZXJgQGTWqyOM2LcyZb087eDbVnaRQ9z"

  # API 地址（默认 OpenAI，也可以改成其他兼容服务）
  base_url: "https://api.gemai.cc/v1"

  # 使用的模型
  model: "[满血E]gemini-3.5-flash"

  # 温度参数（控制回复的随机性，0-2，越高越随机）
  temperature: 0.7

  # 最大回复长度（token 数量）
  max_tokens: 4000

# 系统提示词（定义 AI 的角色）
system_prompt: "你是助手"

# 界面配置
ui:
  # 窗口标题
  window_title: "🤖 简易 AI 桌面助手"

  # 窗口大小
  window_width: 600
  window_height: 700

  # 字体大小
  font_size: 11
